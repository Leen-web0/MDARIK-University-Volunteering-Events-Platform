<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="usermanage.css" rel="stylesheet"/>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <img src="img/Logo.png" alt="Logo" class="img-fluid" />
  </div>
  <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
  <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="usermanage.html" class="active"><i class="fas fa-users-cog"></i> User Manage</a>
  <a href="roles.html"><i class="fas fa-user-lock"></i> Roles & Permissions</a>
  <a href="settings.html"><i class="fas fa-sliders-h"></i> System Settings</a>
  <a href="View_Logs.html"><i class="fas fa-file-alt"></i> View Logs</a>
  <a href="maintenance.html"><i class="fas fa-tools"></i> Maintenance Tools</a>
  <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
</div>

<!-- Main content -->
<div class="main-content">
  <div class="topbar">
    <h1>User Management</h1>
    <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
  </div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Manage Users</h4>
      <button class="btn btn-success" onclick="addUser()"><i class="fas fa-user-plus"></i> Add New User</button>
    </div>

    <input class="form-control search-input" id="searchInput" type="text" placeholder="Search by username" onkeyup="searchUser()">

    <table class="table table-bordered table-striped user-table">
      <thead class="thead-dark">
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="userTable">
        <!-- User rows will be loaded here -->
      </tbody>
    </table>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1" role="dialog" aria-labelledby="editUserModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form id="editUserForm">
        <div class="modal-header">
          <h5 class="modal-title" id="editUserModalLabel">Edit User</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editUserId">
            <div class="form-group">
              <label for="editUsername">Username</label>
              <input type="text" class="form-control" id="editUsername" required>
            </div>
            <div class="form-group">
              <label for="editEmail">Email</label>
              <input type="email" class="form-control" id="editEmail" required>
            </div>
            <div class="form-group">
              <label for="editRole">Role</label>
              <input type="text" class="form-control" id="editRole" required>
            </div>
            <div class="form-group">
              <label for="editStatus">Status</label>
              <select class="form-control" id="editStatus">
                <option value="Active">Active</option>
                <option value="Pending">Pending</option>
              </select>
            </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Sample data
  const users = [
    { id: 1, username: "ahmed_admin", email: "ahmed@company.com", role: "Administrator", status: "Active" },
    { id: 2, username: "sara_tech", email: "sara@company.com", role: "IT Support", status: "Pending" },
    { id: 3, username: "john_doe", email: "john@company.com", role: "User", status: "Active" }
  ];

  function loadUsers() {
    const userTable = document.getElementById('userTable');
    userTable.innerHTML = "";
    users.forEach((user, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${user.username}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td><span class="badge badge-${user.status === 'Active' ? 'success' : 'warning'}">${user.status}</span></td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editUser(${user.id})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      userTable.appendChild(row);
    });
  }

  function editUser(id) {
    const user = users.find(u => u.id === id);
    if (user) {
      document.getElementById('editUserId').value = user.id;
      document.getElementById('editUsername').value = user.username;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editRole').value = user.role;
      document.getElementById('editStatus').value = user.status;
      $('#editUserModal').modal('show');
    }
  }

  document.getElementById('editUserForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = parseInt(document.getElementById('editUserId').value);
    const userIndex = users.findIndex(u => u.id === id);
    if (userIndex !== -1) {
      users[userIndex].username = document.getElementById('editUsername').value;
      users[userIndex].email = document.getElementById('editEmail').value;
      users[userIndex].role = document.getElementById('editRole').value;
      users[userIndex].status = document.getElementById('editStatus').value;
      $('#editUserModal').modal('hide');
      loadUsers();
    }
  });

  function deleteUser(id) {
    const index = users.findIndex(user => user.id === id);
    if (index > -1) {
      users.splice(index, 1);
      loadUsers();
    }
  }

  function addUser() {
    const newUser = { 
      id: users.length + 1, 
      username: "new_user", 
      email: "newuser@company.com", 
      role: "User", 
      status: "Active" 
    };
    users.push(newUser);
    loadUsers();
  }

  function searchUser() {
    const searchInput = document.getElementById('searchInput').value.toLowerCase();
    const filteredUsers = users.filter(user => user.username.toLowerCase().includes(searchInput));
    const userTable = document.getElementById('userTable');
    userTable.innerHTML = "";
    filteredUsers.forEach((user, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${user.username}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td><span class="badge badge-${user.status === 'Active' ? 'success' : 'warning'}">${user.status}</span></td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editUser(${user.id})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      userTable.appendChild(row);
    });
  }

  function logOut() {
    alert("Logging out...");
  }

  window.onload = loadUsers;
</script>

</body>
</html>
