<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IT Staff Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="dashboard.css" rel="stylesheet"/>

 
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <img src="img/Logo.png" alt="Logo" class="img-fluid" />
  </div>
  <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
  <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  <a href="dashboard.html"class="active"><i class="fas fa-tachometer-alt  "></i> Dashboard</a>
  <a href="usermanage.html"><i class="fas fa-ticket-alt"></i> User Manage</ a>
  <a href="roles.html"><i class="fas fa-reply"></i>Roles & Permissions</a>
  <a href="settings.html"><i class="fas fa-reply"></i>System Settings</a>
  <a href="View_Logs.html"><i class="fas fa-file-alt"></i>View Logs</a>
  <a href="maintenance.html"><i class="fas fa-file-alt"></i>Maintenance Tools</a>
  <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
</div>

<!-- Main content -->
<div class="main-content">
  <div class="topbar">
    <h1>IT Staff Dashboard</h1>
    <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
  </div>

  <div class="container">
    <div class="row text-center justify-content-center">
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-exclamation-circle text-danger statistics-icon"></i>
          <div class="text-left">
            <h5>43</h5>
            <p>Open Support Tickets</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-check-circle text-success statistics-icon"></i>
          <div class="text-left">
            <h5>217</h5>
            <p>Closed Tickets</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-server text-warning statistics-icon"></i>
          <div class="text-left">
            <h5>6</h5>
            <p>Active Servers</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="row chart-container">
      <div class="col-md-6">
        <h5 class="text-center">Ticket Distribution</h5>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="col-md-6">
        <h5 class="text-center">Monthly Resolved Tickets</h5>
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Chart Scripts -->
<script>
  // Pie Chart
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  new Chart(pieCtx, {
    type: 'pie',
    data: {
      labels: ['Open', 'Closed', 'Pending'],
      datasets: [{
        label: 'Tickets',
        data: [43, 217, 18],
        backgroundColor: ['#dc3545', '#28a745', '#ffc107']
      }]
    }
  });

  // Bar Chart
  const barCtx = document.getElementById('barChart').getContext('2d');
  new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
      datasets: [{
        label: 'Resolved Tickets',
        data: [30, 45, 60, 50, 72, 90],
        backgroundColor: '#007bff'
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
</script>

</body>
</html>
