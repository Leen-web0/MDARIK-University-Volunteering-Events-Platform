<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View All Logs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="roles.css" rel="stylesheet"/>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <img src="img/Logo.png" alt="Logo" class="img-fluid" />
  </div>
  <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
  <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="usermanage.html"><i class="fas fa-users-cog"></i> User Manage</a>
  <a href="roles.html"><i class="fas fa-user-lock"></i> Roles & Permissions</a>
  <a href="settings.html"><i class="fas fa-sliders-h"></i> System Settings</a>
  <a href="View_Logs.html"><i class="fas fa-file-alt"></i> View Logs</a>
  <a href="maintenance.html"><i class="fas fa-tools"></i> Maintenance Tools</a>
  <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
</div>

<!-- Main content -->
<div class="main-content">
  <div class="topbar">
    <h1>View All Logs</h1>
    <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
  </div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>All Logs</h4>
      <button class="btn btn-info" onclick="window.location.href='View_Logs.html'"><i class="fas fa-arrow-left"></i> Back to Logs</button>
    </div>

    <input class="form-control search-input" id="searchInput" type="text" placeholder="Search by log description" onkeyup="searchLog()">

    <table class="table table-bordered table-striped log-table">
      <thead class="thead-dark">
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>User</th>
          <th>Action</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="logTable">
        <!-- Demo data -->
      </tbody>
    </table>
  </div>
</div>

<script>
  // Demo data for logs
  const logs = [
    { id: 1, date: "2025-04-01 10:00 AM", user: "Admin", action: "Login", description: "User logged into the system" },
    { id: 2, date: "2025-04-01 11:15 AM", user: "IT Support", action: "Password Reset", description: "Reset password for user 'john_doe'" },
    { id: 3, date: "2025-04-02 02:30 PM", user: "Admin", action: "Role Assignment", description: "Assigned 'Admin' role to user 'alice_jones'" },
    { id: 4, date: "2025-04-02 03:00 PM", user: "User", action: "View", description: "Viewed dashboard content" },
    { id: 5, date: "2025-04-03 09:45 AM", user: "Admin", action: "Logout", description: "Admin logged out from the system" }
  ];

  // Display logs on load
  function loadLogs() {
    const logTable = document.getElementById('logTable');
    logTable.innerHTML = "";
    logs.forEach((log, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${log.date}</td>
        <td>${log.user}</td>
        <td>${log.action}</td>
        <td>${log.description}</td>
      `;
      logTable.appendChild(row);
    });
  }

  // Search Log
  function searchLog() {
    const searchInput = document.getElementById('searchInput').value.toLowerCase();
    const filteredLogs = logs.filter(log => log.description.toLowerCase().includes(searchInput));
    
    const logTable = document.getElementById('logTable');
    logTable.innerHTML = "";
    filteredLogs.forEach((log, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${log.date}</td>
        <td>${log.user}</td>
        <td>${log.action}</td>
        <td>${log.description}</td>
      `;
      logTable.appendChild(row);
    });
  }

  // Log out function
  function logOut() {
    alert("Logging out...");
  }

  // Load logs on page load
  window.onload = loadLogs;
</script>

</body>
</html>
