<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roles & Permissions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="roles.css" rel="stylesheet"/>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <img src="img/Logo.png" alt="Logo" class="img-fluid" />
  </div>
  <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
  <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="usermanage.html"><i class="fas fa-users-cog"></i> User Manage</a>
  <a href="roles.html" class="active"><i class="fas fa-user-lock"></i> Roles & Permissions</a>
  <a href="settings.html"><i class="fas fa-sliders-h"></i> System Settings</a>
  <a href="View_Logs.html"><i class="fas fa-file-alt"></i> View Logs</a>
  <a href="maintenance.html"><i class="fas fa-tools"></i> Maintenance Tools</a>
  <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
</div>

<!-- Main content -->
<div class="main-content">
  <div class="topbar">
    <h1>Roles & Permissions</h1>
    <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
  </div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Manage Roles & Permissions</h4>
      <button class="btn btn-success" onclick="addRole()"><i class="fas fa-user-plus"></i> Add New Role</button>
    </div>

    <input class="form-control search-input mb-3" id="searchInput" type="text" placeholder="Search by role name" onkeyup="searchRole()">

    <table class="table table-bordered table-striped role-table">
      <thead class="thead-dark">
        <tr>
          <th>#</th>
          <th>Role Name</th>
          <th>Description</th>
          <th>Permissions</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="roleTable"></tbody>
    </table>
  </div>
</div>

<!-- Edit Role Modal -->
<div class="modal fade" id="editRoleModal" tabindex="-1" role="dialog" aria-labelledby="editRoleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Role</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editRoleId">
        <div class="form-group">
          <label for="editRoleName">Role Name</label>
          <input type="text" class="form-control" id="editRoleName">
        </div>
        <div class="form-group">
          <label for="editDescription">Description</label>
          <input type="text" class="form-control" id="editDescription">
        </div>
        <div class="form-group">
          <label for="editPermissions">Permissions</label>
          <input type="text" class="form-control" id="editPermissions">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveRoleChanges()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const roles = [
    { id: 1, roleName: "Administrator", description: "Has full access to all resources", permissions: "All permissions" },
    { id: 2, roleName: "IT Support", description: "Can manage user accounts", permissions: "Manage users" },
    { id: 3, roleName: "User", description: "Can access basic resources", permissions: "View content" }
  ];

  function loadRoles() {
    const roleTable = document.getElementById('roleTable');
    roleTable.innerHTML = "";
    roles.forEach((role, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${role.roleName}</td>
        <td>${role.description}</td>
        <td>${role.permissions}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editRole(${role.id})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRole(${role.id})"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      roleTable.appendChild(row);
    });
  }

  function editRole(id) {
    const role = roles.find(r => r.id === id);
    if (!role) return;

    document.getElementById('editRoleId').value = role.id;
    document.getElementById('editRoleName').value = role.roleName;
    document.getElementById('editDescription').value = role.description;
    document.getElementById('editPermissions').value = role.permissions;

    $('#editRoleModal').modal('show');
  }

  function saveRoleChanges() {
    const id = parseInt(document.getElementById('editRoleId').value);
    const name = document.getElementById('editRoleName').value;
    const desc = document.getElementById('editDescription').value;
    const perm = document.getElementById('editPermissions').value;

    const index = roles.findIndex(role => role.id === id);
    if (index > -1) {
      roles[index].roleName = name;
      roles[index].description = desc;
      roles[index].permissions = perm;
    }

    $('#editRoleModal').modal('hide');
    loadRoles();
  }

  function deleteRole(id) {
    const roleIndex = roles.findIndex(role => role.id === id);
    if (roleIndex > -1) {
      roles.splice(roleIndex, 1);
      loadRoles();
    }
  }

  function addRole() {
    const newRole = {
      id: roles.length + 1,
      roleName: "New Role",
      description: "Description of new role",
      permissions: "New permissions"
    };
    roles.push(newRole);
    loadRoles();
  }

  function searchRole() {
    const searchInput = document.getElementById('searchInput').value.toLowerCase();
    const filteredRoles = roles.filter(role => role.roleName.toLowerCase().includes(searchInput));
    const roleTable = document.getElementById('roleTable');
    roleTable.innerHTML = "";
    filteredRoles.forEach((role, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${role.roleName}</td>
        <td>${role.description}</td>
        <td>${role.permissions}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editRole(${role.id})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRole(${role.id})"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      roleTable.appendChild(row);
    });
  }

  function logOut() {
    alert("Logging out...");
  }

  window.onload = loadRoles;
</script>

</body>
</html>
