<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>University Manager Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
   <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="Event_Approval.html"><i class="fas fa-ticket-alt"></i> Event Approval</a>
    <a href="Budget_Manage.html"><i class="fas fa-coins"></i> Budget Manage</a>
    <a href="Statistics_Analytics.html"><i class="fas fa-chart-line"></i> Statistics & Analytics</a>
    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="topbar">
      <h1>University Manager Dashboard</h1>
      <button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="container">
      <div class="row text-center justify-content-center">
        <div class="col-md-4 mb-4">
          <div class="statistics-card">
            <i class="fas fa-calendar-check text-warning statistics-icon"></i>
            <div class="text-left">
              <h5>12</h5>
              <p>Pending Event Approvals</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="statistics-card">
            <i class="fas fa-envelope text-primary statistics-icon"></i>
            <div class="text-left">
              <h5>35</h5>
              <p>Unread Notifications</p>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="statistics-card">
            <i class="fas fa-coins text-success statistics-icon"></i>
            <div class="text-left">
              <h5>$450K</h5>
              <p>Budget Requests</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="row chart-container">
        <div class="col-md-6">
          <h5 class="text-center">Event Request Status</h5>
          <canvas id="pieChart"></canvas>
        </div>
        <div class="col-md-6">
          <h5 class="text-center">Monthly Budget Allocation</h5>
          <canvas id="barChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
