<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="login.css" rel="stylesheet"/>
</head>
<body>
<div class="login-container">
  <!-- Logo Section -->
  <div class="logo-section">
    <img src="img/loginlogo.PNG" alt="Logo">
</div>
  <!-- Form Section -->
  <div class="form-section">
    <h2 class="text-center mb-4">Login</h2>
    <p class="text-center mb-4">Welcome back! Please login to your account.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">User Name</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe">Remember Me</label>
        <a href="#" class="float-right">Forgot Password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <div id="errorMsg" class="text-danger text-center mt-3" style="display:none;">Invalid username or password.</div>
  </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<!-- Custom Script -->
<script>
    // Demo user data: username, password, and folder name
    const users = [
      { username: "Administrative", password: "admin123", folder: "Adminstrtive" },
      { username: "Faculty", password: "faculty123", folder: "Faculty" },
      { username: "IT", password: "it123", folder: "IT" },
      { username: "Organizer", password: "organizer123", folder: "organizer" },
      { username: "Student", password: "student123", folder: "student" },
      { username: "Support", password: "support123", folder: "Support" },
      { username: "UniversityManager", password: "manager123", folder: "University Manager" }
    ];
    
    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent form from submitting normally
    
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
    
      const user = users.find(u => 
        u.username.toLowerCase() === usernameInput.toLowerCase() && 
        u.password === passwordInput
      );
    
      if (user) {
        // Redirect to the correct profile.html inside the folder
        const folderName = encodeURIComponent(user.folder); // Encode if folder name has spaces
        window.location.href = `${folderName}/profile.html`;
      } else {
        // Show error message
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
    </script>
    
</script>

</body>
</html>
