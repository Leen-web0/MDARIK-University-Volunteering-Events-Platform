<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Organizer Upload Documents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="Upload_Documents.css"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
    <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="Manage_Event.html"><i class="fas fa-tachometer-alt"></i> Manage Event</a>
    <a href="attendance.html" ><i class="fas fa-users"></i> Attendance</a>

    <a href="Event_Status.html"><i class="fas fa-ticket-alt"></i> Event Status</a>
    <a href="Notifications.html"><i class="fas fa-bell"></i> Notifications</a>
    <a href="Upload_Documents.html" ><i class="fas fa-upload"></i> Upload Documents</a>
    <a href="Reports.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="topbar">
      <h1>Upload Documents</h1>
      <button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button>
    </div>

    <div class="container mt-4">
      <form>
        <div class="form-group">
          <label for="docName">Document Name:</label>
          <input type="text" id="docName" name="docName">
        </div>
        <div class="form-group">
          <label for="docTitle">Document Title:</label>
          <input type="text" id="docTitle" name="docTitle">
        </div>
        <div class="form-group">
          <label for="fileUpload">Choose File:</label>
          <input type="file" id="fileUpload" name="fileUpload">
        </div>
        <button type="submit" class="upload-button">Upload File</button>
      </form>
    </div>
  </div>
</body>
</html>
