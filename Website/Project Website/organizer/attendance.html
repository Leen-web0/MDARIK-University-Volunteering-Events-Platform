<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="Manage_Event.css" rel="stylesheet"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
    <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="Manage_Event.html"><i class="fas fa-tachometer-alt"></i> Manage Events</a>
    <a href="attendance.html"class="active"><i class="fas fa-users"></i> Attendance</a>
    <a href="Event_Status.html"><i class="fas fa-ticket-alt"></i> Event Status</a>
    <a href="Notifications.html"><i class="fas fa-bell"></i> Notifications</a>
    <a href="Upload_Documents.html"><i class="fas fa-upload"></i> Upload Documents</a>
    <a href="Reports.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log Out</a>
    
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="topbar">
      <h1>Event Attendance</h1>
      <button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button>
    </div>

    <div class="container">
      <div class="form-card">
        <h3 class="form-title">Mark Attendance</h3>
        <form>
          <label>Event Name:</label>
          <input type="text" placeholder="e.g. Environmental Awareness Campaign" required>

          <label>Event Date:</label>
          <input type="date" required>

          <label>Add Students Attending:</label>
          <div id="students-list">
            <div class="student-entry d-flex mb-2">
              <input type="text" class="form-control mr-2" placeholder="Student Name" required />
              <input type="text" class="form-control mr-2" placeholder="Student ID" required />
              <button type="button" class="btn btn-danger" onclick="removeStudent(this)"><i class="fas fa-minus-circle"></i></button>
            </div>
          </div>

          <button type="button" class="btn btn-secondary mb-3" onclick="addStudent()">
            <i class="fas fa-user-plus"></i> Add Another Student
          </button>

          <div class="buttons">
            <button type="submit" class="add-btn">Submit Attendance</button>
            <button type="reset" class="cancel-btn">Clear Form</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function addStudent() {
      const container = document.getElementById('students-list');
      const entry = document.createElement('div');
      entry.classList.add('student-entry', 'd-flex', 'mb-2');
      entry.innerHTML = `
        <input type="text" class="form-control mr-2" placeholder="Student Name" required />
        <input type="text" class="form-control mr-2" placeholder="Student ID" required />
        <button type="button" class="btn btn-danger" onclick="removeStudent(this)">
          <i class="fas fa-minus-circle"></i>
        </button>
      `;
      container.appendChild(entry);
    }

    function removeStudent(button) {
      const entry = button.closest('.student-entry');
      entry.remove();
    }
  </script>
</body>
</html>
