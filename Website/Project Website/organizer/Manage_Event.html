<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create New Event</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="Manage_Event.css" rel="stylesheet"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
    <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="Manage_Event.html" class="active"><i class="fas fa-tachometer-alt"></i> Manage Event</a>
    <a href="attendance.html" ><i class="fas fa-users"></i> Attendance</a>

    <a href="Event_Status.html"><i class="fas fa-ticket-alt"></i> Event Status</a>
    <a href="Notifications.html"><i class="fas fa-bell"></i> Notifications</a>
    <a href="Upload_Documents.html"><i class="fas fa-upload"></i> Upload Documents</a>
    <a href="Reports.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="topbar">
      <h1>Create New Event</h1>
      <button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button>
    </div>

    <div class="container">
      <div class="form-card">
        <h3 class="form-title">Create New Event</h3>
        <form>
          <label>Event Name:</label>
          <input type="text" placeholder="e.g. Environmental Awareness Campaign" required>

          <label>Event Type:</label>
          <select required>
            <option value="">Select Type</option>
            <option>Environmental</option>
            <option>Cultural</option>
            <option>Volunteer</option>
            <option>Social</option>
          </select>

          <label>Date:</label>
          <input type="date" required>

          <label>Total Certified Event Hours:</label>
          <input type="number" placeholder="e.g. 3" min="1" required>


          <label>Number of seats:</label>
          <input type="number" placeholder="e.g. 3" min="1" required>


          <label>Location:</label>
          <input type="text" placeholder="e.g. Science Building - Main Hall" required>

          <label>Description:</label>
          <textarea placeholder="Briefly describe the event..." required></textarea>

          <div class="buttons">
            <button type="submit" class="add-btn">+ Create Event</button>
            <button type="button" class="save-btn">Save Changes</button>
            <button type="button" class="publish-btn">Publish Event</button>
            <button type="button" class="cancel-btn">Cancel</button>
            <button type="button" class="delete-btn">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
