<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calendar Manage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="Calendar.css" rel="stylesheet"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
    <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  
    <a href="Courses_Manage.html"><i class="fas fa-ticket-alt"></i> Courses Manage</a>
    <a href="Suggestion.html"><i class="fas fa-coins"></i> Suggestion</a>
    <a href="Calendar.html" class="active"><i class="fas fa-calendar-alt"></i> Calendar</a>
    <a href="Notification.html"><i class="fas fa-bell"></i> Notification</a>
    <a href="Inquiries.html"><i class="fas fa-chart-line"></i>  Student Inquiries</a>

    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <h1>Calendar Event Management</h1>
      <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
    </div>

    <div class="container">
      <div class="form-card">
        <h3 class="form-title">Add Calendar Event</h3>
        <form>
          <div class="form-group">
            <label for="eventName">Event Name:</label>
            <input type="text" class="form-control" id="eventName" placeholder="Enter event name" required>
          </div>
          <div class="form-group">
            <label for="startDate">Event Date Start:</label>
            <input type="date" class="form-control" id="startDate" required>
          </div>
          <div class="form-group">
            <label for="endDate">Event Date End:</label>
            <input type="date" class="form-control" id="endDate" required>
          </div>
          <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" class="form-control" id="location" placeholder="Enter location" required>
          </div>
          <div class="form-group">
            <label for="createDate">Create Date:</label>
            <input type="date" class="form-control" id="createDate" required>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-success"><i class="fas fa-calendar-plus"></i> Add Event</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
