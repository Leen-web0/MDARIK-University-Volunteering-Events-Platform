<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Courses Manage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="Courses_Manage.css" rel="stylesheet"/>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid" />
    </div>
    <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="Courses_Manage.html" class="active"><i class="fas fa-book"></i> Courses Manage</a>
    <a href="Suggestion.html"><i class="fas fa-lightbulb"></i> Suggestion</a>
    <a href="Calendar.html"><i class="fas fa-calendar-alt"></i> Calendar</a>
    <a href="Inquiries.html"><i class="fas fa-chart-line"></i>  Student Inquiries</a>

    <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <h1>Courses Manage</h1>
      <a href="../index.html"><button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button></a>
    </div>

    <div class="container">
      <div class="form-card">
        <h3 class="form-title">Add New Course</h3>
        <form>
          <div class="form-group">
            <label for="courseName">Course Name:</label>
            <input type="text" class="form-control" id="courseName" placeholder="Enter course name" required>
          </div>
          <div class="form-group">
            <label for="courseDescription">Course Description:</label>
            <textarea class="form-control" id="courseDescription" placeholder="Enter course description" required></textarea>
          </div>
          <div class="form-group">
            <label for="courseTime">Course Time:</label>
            <input type="time" class="form-control" id="courseTime" required>
          </div>
          <div class="form-group">
            <label for="courseLocation">Course Location:</label>
            <input type="text" class="form-control" id="courseLocation" placeholder="Enter course location" required>
          </div>
          <div class="form-group">
            <label for="availableSeats">Available Seats:</label>
            <input type="number" class="form-control" id="availableSeats" placeholder="Enter number of available seats" required>
          </div>
          <div class="form-group">
            <label for="courseDate">Course Date:</label>
            <input type="date" class="form-control" id="courseDate" required>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-success"><i class="fas fa-plus-circle"></i> Add Course</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
