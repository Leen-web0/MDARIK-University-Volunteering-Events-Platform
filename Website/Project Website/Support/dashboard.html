<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Technical Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="dashboard.css" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  
 
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <img src="img/Logo.png" alt="Logo" class="img-fluid" />
  </div>
  <a href="../index.html"><i class="fas fa-home"></i> Home page</a>
  <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
  <a href="dashboard.html"class="active"><i class="fas fa-tachometer-alt  "></i> Dashboard</a>
  <a href="tickets.html"><i class="fas fa-ticket-alt"></i> Support Tickets</a>
  <a href="reply.html"><i class="fas fa-reply"></i> Reply to Tickets</a>
  <a href="reports.html"><i class="fas fa-file-alt"></i> User Reports</a>
  <a href="../index.html"><i class="fas fa-sign-out-alt"></i> Log out</a>
</div>

<!-- Main content -->
<div class="main-content">
  <div class="topbar">
    <h1>Technical Support</h1>
    <button class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Log out</button>
  </div>

  <div class="container">
    <div class="row text-center justify-content-center">
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-users text-primary statistics-icon"></i>
          <div class="text-left">
            <h5>2,375</h5>
            <p>Participating Students</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-calendar-check text-success statistics-icon"></i>
          <div class="text-left">
            <h5>150</h5>
            <p>Implemented Events</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="statistics-card">
          <i class="fas fa-university text-warning statistics-icon"></i>
          <div class="text-left">
            <h5>10</h5>
            <p>Participating Colleges</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="row chart-container">
      <div class="col-md-6">
        <h5 class="text-center">Ticket Status</h5>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="col-md-6">
        <h5 class="text-center">Monthly Events</h5>
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script>
  // Pie Chart
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  new Chart(pieCtx, {
    type: 'pie',
    data: {
      labels: ['Open', 'Closed', 'Pending'],
      datasets: [{
        label: 'Tickets',
        data: [50, 30, 20],
        backgroundColor: ['#007bff', '#28a745', '#ffc107']
      }]
    }
  });

  // Bar Chart
  const barCtx = document.getElementById('barChart').getContext('2d');
  new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
      datasets: [{
        label: 'Events',
        data: [10, 12, 8, 15, 7, 14],
        backgroundColor: '#17a2b8'
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
</script>

</body>
</html>
