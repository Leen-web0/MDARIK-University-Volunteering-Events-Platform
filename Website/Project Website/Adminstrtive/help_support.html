<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Help & Support - Admin Employee</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="support.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="img/Logo.png" alt="Logo" class="img-fluid">
    </div>
    <a href="./profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="./dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="./manage_proposals.html"><i class="fas fa-folder-open"></i> Manage Proposals</a>
    <a href="./certificate_management.html"><i class="fas fa-certificate"></i> Certificate Management</a>
    <a href="./reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
    <a href="./notifications.html"><i class="fas fa-bell"></i> Notifications</a>
    <a href="./help_support.html" class="active"><i class="fas fa-question-circle"></i> Help & Support</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
      <h1>Help & Support</h1>
      <button class="btn btn-danger btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log out</button>
    </div>
    <div class="support-form">
      <form>
        <div class="form-group">
          <label for="issue">Describe Your Issue:</label>
          <textarea id="issue" class="form-control" rows="6" placeholder="Please describe the problem or request you need help with..."></textarea>
        </div>
        <button type="submit" class="btn-submit">Submit Request</button>
      </form>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Logout function
    function logout() {
      if (confirm('Are you sure you want to log out?')) {
        window.location.href = './index.html';
      }
    }
  </script>
</body>
</html>
